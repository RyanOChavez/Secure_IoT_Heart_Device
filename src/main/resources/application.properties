spring.application.name=Secure_IoT_Heart_Device_CSC492

# H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:iotdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# AES-128 encryption (key and IV must each be exactly 16 characters)
aes.secret.key=IoTSecureKey1234
aes.secret.iv=InitVector123456

logging.level.com.example.secure_iot_heart_device_csc492=INFO

# Pretty-print JSON responses
spring.jackson.serialization.indent-output=true
